name: Update Activity

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write


jobs:
  update-readme:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Update Activity
        uses: Readme-Workflows/recent-activity@main

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
